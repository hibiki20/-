<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12142a" id="themeColorMeta">
<meta name="description" content="無限に遊べるお絵かきロジック（ノノグラム）パズルゲーム">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>お絵かきロジック</title>
<style>
:root {
  --bg: #12142a;
  --card: #1c1f42;
  --card2: #20244c;
  --text: #eef0ff;
  --text-sub: #9498c9;
  --border: #2c2f5c;
  --primary: #5b6ef0;
  --primary-dark: #4553c9;
  --cell-blank: #242754;
  --cell-blank-hover: #2c2f66;
  --wrong: #e5484d;
  --grid-line: #383b73;
  --grid-line-strong: #4c5099;
  --radius: 16px;
}
body.light {
  --bg: #eef0fa;
  --card: #ffffff;
  --card2: #f5f6fc;
  --text: #1a1a2e;
  --text-sub: #6b6f8f;
  --border: #dee1f2;
  --primary: #4f63d2;
  --primary-dark: #3b4cb8;
  --cell-blank: #eceefb;
  --cell-blank-hover: #e0e3f8;
  --wrong: #e5484d;
  --grid-line: #ccd0ec;
  --grid-line-strong: #9aa1d9;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.app {
  flex: 1;
  min-height: 0;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ヘッダー */
.header {
  background: var(--card);
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.title-row { display: flex; align-items: center; justify-content: space-between; }
.title-row h1 { font-size: 18px; font-weight: 800; letter-spacing: .01em; }
.icon-btn {
  width: 38px; height: 38px;
  border: none; border-radius: 10px;
  background: var(--card2);
  font-size: 17px;
  cursor: pointer;
}
.stat-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-top: 10px;
}
.stat {
  background: var(--card2);
  border-radius: 10px;
  padding: 6px 2px 7px;
  text-align: center;
}
.stat span {
  display: block;
  font-size: 14px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.stat label {
  display: block;
  font-size: 9.5px;
  color: var(--text-sub);
  font-weight: 600;
  margin-top: 1px;
}

/* ツールバー */
.toolbar {
  flex-shrink: 0;
  padding: 10px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--bg);
}
.toolbar-row { display: flex; gap: 8px; }
.tbtn {
  flex: 1;
  height: 42px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}
.tbtn.icon { flex: 0 0 46px; font-size: 17px; }
.tbtn.mode-btn.on {
  border-color: var(--primary);
  color: #fff;
  background: var(--primary);
}
.size-select {
  flex: 1;
  height: 42px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--card);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  padding: 0 10px;
  appearance: none;
}

/* 盤面 */
.board-wrap {
  flex: 1;
  min-height: 0;
  padding: 0 12px 12px;
}
.board-scroll {
  width: 100%;
  height: 100%;
  overflow: auto;
  background: var(--card);
  border-radius: 14px;
  padding: 14px;
  -webkit-overflow-scrolling: touch;
}
.board {
  display: inline-grid;
  --cell: 40px;
}
.corner {
  position: sticky;
  top: 0; left: 0;
  z-index: 5;
  background: var(--card);
}
.clue {
  background: var(--card);
  color: var(--text-sub);
  font-size: 11px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  border: 1px solid var(--border);
  transition: opacity .2s;
}
.clue.done { opacity: .32; text-decoration: line-through; }
.clue-top {
  position: sticky;
  top: 0;
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 3px 3px 4px;
  line-height: 1.15;
}
.clue-top span { display: block; }
.clue-top.thick-r { border-right: 2px solid var(--grid-line-strong); }
.clue-left {
  position: sticky;
  left: 0;
  z-index: 4;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 6px;
  white-space: nowrap;
}
.clue-left span { display: inline-block; margin-left: 4px; }
.clue-left span:first-child { margin-left: 0; }
.clue-left.thick-b { border-bottom: 2px solid var(--grid-line-strong); }
.cell {
  width: var(--cell);
  height: var(--cell);
  background: var(--cell-blank);
  border: 1px solid var(--grid-line);
  cursor: pointer;
  position: relative;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(var(--cell) * 0.55);
  font-weight: 700;
  transition: background-color .1s;
}
.cell.thick-r { border-right: 2px solid var(--grid-line-strong); }
.cell.thick-b { border-bottom: 2px solid var(--grid-line-strong); }
.cell.filled { background: var(--primary); }
.cell.marked { color: var(--text-sub); }
.cell.wrong { background: rgba(229, 72, 77, .18); color: var(--wrong); }

/* モーダル */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(8, 9, 22, 0.6);
  z-index: 200;
}
.modal.open { display: flex; flex-direction: column; justify-content: flex-end; }
.sheet {
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
}
.sheet-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 18px 12px;
}
.sheet-head strong { font-size: 16px; }
.sheet-close {
  border: none;
  background: var(--card2);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  color: var(--text-sub);
}
.sheet-body { overflow-y: auto; padding: 0 16px calc(20px + env(safe-area-inset-bottom)); }

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-sub);
  margin-bottom: 12px;
  letter-spacing: .04em;
}
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 6px;
}
.seg { display: flex; gap: 8px; }
.seg-btn {
  flex: 1;
  height: 40px;
  border: 1.5px solid var(--border);
  background: var(--card2);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-sub);
  font-family: inherit;
  cursor: pointer;
}
.seg-btn.on { border-color: var(--primary); color: #fff; background: var(--primary); }
.howto { font-size: 12.5px; line-height: 1.8; color: var(--text-sub); }
.hint-count { font-size: 12px; color: var(--text-sub); margin-top: 10px; line-height: 1.7; }

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 48px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }

/* クリアモーダル */
.win-sheet { padding: 30px 24px calc(24px + env(safe-area-inset-bottom)); text-align: center; }
.win-emoji { font-size: 52px; }
.win-sheet h2 { font-size: 22px; font-weight: 800; margin: 6px 0 18px; }
.win-stats { display: flex; justify-content: center; gap: 22px; margin-bottom: 22px; }
.win-stats div { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.win-stats span { font-size: 11px; color: var(--text-sub); font-weight: 600; }
.win-stats strong { font-size: 20px; font-variant-numeric: tabular-nums; }

.toast {
  position: fixed;
  left: 50%;
  bottom: 30px;
  transform: translateX(-50%);
  background: rgba(15, 17, 40, 0.92);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  padding: 11px 22px;
  border-radius: 30px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  z-index: 300;
  white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="title-row">
      <h1>🎨 お絵かきロジック</h1>
      <button class="icon-btn" id="btnSettings">⚙️</button>
    </div>
    <div class="stat-row">
      <div class="stat"><span id="statSize">5×5</span><label>サイズ</label></div>
      <div class="stat"><span id="statTime">00:00</span><label>タイム</label></div>
      <div class="stat"><span id="statMistakes">0</span><label>ミス</label></div>
      <div class="stat"><span id="statStreak">0</span><label>連続</label></div>
      <div class="stat"><span id="statBest">0</span><label>ベスト</label></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-row">
      <select class="size-select" id="sizeSelect">
        <option value="S">小 5×5</option>
        <option value="M">中 8×8</option>
        <option value="L">大 12×12</option>
        <option value="XL">特大 15×15</option>
        <option value="auto">おまかせ（だんだん大きく）</option>
      </select>
      <button class="tbtn" id="btnNew">🔄 新しい問題</button>
    </div>
    <div class="toolbar-row">
      <button class="tbtn mode-btn on" id="modeFillBtn">🖊 塗る</button>
      <button class="tbtn mode-btn" id="modeMarkBtn">✕ 印をつける</button>
      <button class="tbtn icon" id="btnUndo" title="元に戻す">↺</button>
      <button class="tbtn icon" id="btnHint" title="ヒント">💡</button>
    </div>
  </div>

  <div class="board-wrap">
    <div class="board-scroll" id="boardScroll">
      <div class="board" id="board"></div>
    </div>
  </div>
</div>

<!-- 設定モーダル -->
<div class="modal" id="settingsModal">
  <div class="sheet">
    <div class="sheet-head">
      <strong>設定</strong>
      <button class="sheet-close" id="btnCloseSettings">✕</button>
    </div>
    <div class="sheet-body">
      <div class="card">
        <div class="card-title">表示</div>
        <div class="field">
          <label>テーマ</label>
          <div class="seg">
            <button type="button" class="seg-btn" id="themeLightBtn">ライト</button>
            <button type="button" class="seg-btn" id="themeDarkBtn">ダーク</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">遊び方</div>
        <p class="howto">
          数字は、その行・列で連続して塗るマスの数を表します。数字が複数ある場合は、書かれた順番どおりに並び、数字と数字の間には必ず1マス以上の空白が入ります。すべての行と列の数字を満たす塗り方を見つけると、絵が完成します。<br><br>
          「塗る」でマスを塗り、「印をつける」で空白と分かっているマスに✕印を置けます。違うマスを塗ると赤く表示されます（何度でもやり直せます）。<br><br>
          ホーム画面に追加すると、アプリのようにオフラインでも遊べます。
        </p>
      </div>
      <div class="card">
        <div class="card-title">記録</div>
        <p class="hint-count" id="settingsTotals"></p>
        <button class="btn btn-outline" id="btnResetProgress" style="margin-top:12px">進行状況をリセット</button>
      </div>
    </div>
  </div>
</div>

<!-- クリアモーダル -->
<div class="modal" id="winModal">
  <div class="sheet win-sheet">
    <div class="win-emoji">🎉</div>
    <h2>クリア！</h2>
    <div class="win-stats">
      <div><strong id="winTime">00:00</strong><span>タイム</span></div>
      <div><strong id="winMistakes">0</strong><span>ミス</span></div>
      <div><strong id="winStreak">0</strong><span>連続クリア</span></div>
    </div>
    <button class="btn btn-primary" id="btnNext">つぎのパズルへ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

var STORAGE_KEY = "oekaki_v1";
var $ = function(id) { return document.getElementById(id); };

var state = null;
var mode = "fill";
var cellEls = [];
var rowClueEls = [];
var colClueEls = [];
var timerHandle = null;

/* ---------- パズル生成 ---------- */
function clueFor(arr) {
  var res = [];
  var run = 0;
  for (var i = 0; i < arr.length; i++) {
    if (arr[i]) { run++; }
    else if (run > 0) { res.push(run); run = 0; }
  }
  if (run > 0) res.push(run);
  if (!res.length) res.push(0);
  return res;
}

function generateSolution(n) {
  var grid = [];
  for (var r = 0; r < n; r++) grid.push(new Array(n).fill(false));
  var target = Math.round(n * n * (0.42 + Math.random() * 0.16));
  var filled = 0, attempts = 0, maxAttempts = n * n * 25;
  while (filled < target && attempts < maxAttempts) {
    attempts++;
    var r = Math.floor(Math.random() * n);
    var c = Math.floor(Math.random() * n);
    if (grid[r][c]) continue;
    grid[r][c] = true;
    filled++;
    var walkLen = 2 + Math.floor(Math.random() * Math.max(2, Math.round(n / 2)));
    var cr = r, cc = c;
    for (var i = 0; i < walkLen && filled < target; i++) {
      var dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
      var d = dirs[Math.floor(Math.random() * dirs.length)];
      var nr = cr + d[0], nc = cc + d[1];
      if (nr < 0 || nr >= n || nc < 0 || nc >= n) continue;
      if (!grid[nr][nc]) { grid[nr][nc] = true; filled++; }
      cr = nr; cc = nc;
    }
  }
  return grid;
}

function buildPuzzle(n) {
  var sol = generateSolution(n);
  var rowClues = sol.map(clueFor);
  var colClues = [];
  for (var c = 0; c < n; c++) {
    var col = [];
    for (var r = 0; r < n; r++) col.push(sol[r][c]);
    colClues.push(clueFor(col));
  }
  return { n: n, solution: sol, rowClues: rowClues, colClues: colClues };
}

function newGameState(n) {
  var puzzle = buildPuzzle(n);
  var cells = [];
  var remaining = 0;
  for (var r = 0; r < n; r++) {
    var row = [];
    for (var c = 0; c < n; c++) {
      row.push(0);
      if (puzzle.solution[r][c]) remaining++;
    }
    cells.push(row);
  }
  return { puzzle: puzzle, cells: cells, remaining: remaining, mistakes: 0, hints: 0, elapsed: 0, solved: false, history: [] };
}

function sizeForMode(sizeMode, streak) {
  if (sizeMode === "auto") return Math.min(15, 5 + Math.floor(streak / 2));
  if (sizeMode === "M") return 8;
  if (sizeMode === "L") return 12;
  if (sizeMode === "XL") return 15;
  return 5;
}

function defaultState() {
  return {
    theme: "dark",
    sizeMode: "S",
    streak: 0,
    best: 0,
    totalCleared: 0,
    game: newGameState(5)
  };
}

/* ---------- 保存・読込 ---------- */
function load() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var parsed = JSON.parse(raw);
      if (parsed && parsed.game && parsed.game.puzzle && parsed.game.cells) {
        state = parsed;
        return;
      }
    }
  } catch (e) {}
  state = defaultState();
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

/* ---------- 表示ユーティリティ ---------- */
function toast(msg) {
  var t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function () { t.classList.remove("show"); }, 1800);
}
function vibrate(ms) {
  try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {}
}
function fmtTime(s) {
  var m = Math.floor(s / 60), ss = s % 60;
  return String(m).padStart(2, "0") + ":" + String(ss).padStart(2, "0");
}
function cellSizeFor(n) {
  if (n <= 5) return 46;
  if (n <= 8) return 38;
  if (n <= 11) return 32;
  if (n <= 15) return 27;
  return 22;
}
function applyTheme() {
  document.body.classList.toggle("light", state.theme === "light");
  $("themeColorMeta").setAttribute("content", state.theme === "light" ? "#eef0fa" : "#12142a");
  $("themeLightBtn").classList.toggle("on", state.theme === "light");
  $("themeDarkBtn").classList.toggle("on", state.theme !== "light");
}

/* ---------- 盤面描画 ---------- */
function applyCellVisual(el, val) {
  el.classList.remove("filled", "marked", "wrong");
  el.textContent = "";
  if (val === 1) el.classList.add("filled");
  else if (val === 2) { el.classList.add("marked"); el.textContent = "✕"; }
  else if (val === 3) { el.classList.add("wrong"); el.textContent = "✕"; }
}

function renderBoard() {
  var g = state.game;
  var n = g.puzzle.n;
  var board = $("board");
  board.innerHTML = "";
  var px = cellSizeFor(n);
  board.style.setProperty("--cell", px + "px");
  board.style.gridTemplateColumns = "max-content repeat(" + n + ", var(--cell))";
  board.style.gridTemplateRows = "max-content repeat(" + n + ", var(--cell))";

  cellEls = [];
  rowClueEls = [];
  colClueEls = [];

  var corner = document.createElement("div");
  corner.className = "corner";
  board.appendChild(corner);

  for (var c = 0; c < n; c++) {
    var ce = document.createElement("div");
    ce.className = "clue clue-top" + (((c + 1) % 5 === 0 && c + 1 < n) ? " thick-r" : "");
    var html = "";
    for (var k = 0; k < g.puzzle.colClues[c].length; k++) html += "<span>" + g.puzzle.colClues[c][k] + "</span>";
    ce.innerHTML = html;
    board.appendChild(ce);
    colClueEls.push(ce);
  }

  for (var r = 0; r < n; r++) {
    var re = document.createElement("div");
    re.className = "clue clue-left" + (((r + 1) % 5 === 0 && r + 1 < n) ? " thick-b" : "");
    var rhtml = "";
    for (var k2 = 0; k2 < g.puzzle.rowClues[r].length; k2++) rhtml += "<span>" + g.puzzle.rowClues[r][k2] + "</span>";
    re.innerHTML = rhtml;
    board.appendChild(re);
    rowClueEls.push(re);

    var rowArr = [];
    for (var c2 = 0; c2 < n; c2++) {
      var cell = document.createElement("div");
      cell.className = "cell" +
        (((c2 + 1) % 5 === 0 && c2 + 1 < n) ? " thick-r" : "") +
        (((r + 1) % 5 === 0 && r + 1 < n) ? " thick-b" : "");
      cell.dataset.r = r;
      cell.dataset.c = c2;
      applyCellVisual(cell, g.cells[r][c2]);
      board.appendChild(cell);
      rowArr.push(cell);
    }
    cellEls.push(rowArr);
  }
  updateAllClueStatus();
}

function rowComplete(r) {
  var g = state.game, n = g.puzzle.n;
  for (var c = 0; c < n; c++) {
    if (g.puzzle.solution[r][c] !== (g.cells[r][c] === 1)) return false;
  }
  return true;
}
function colComplete(c) {
  var g = state.game, n = g.puzzle.n;
  for (var r = 0; r < n; r++) {
    if (g.puzzle.solution[r][c] !== (g.cells[r][c] === 1)) return false;
  }
  return true;
}
function updateClueStatus(r, c) {
  rowClueEls[r].classList.toggle("done", rowComplete(r));
  colClueEls[c].classList.toggle("done", colComplete(c));
}
function updateAllClueStatus() {
  var n = state.game.puzzle.n;
  for (var r = 0; r < n; r++) rowClueEls[r].classList.toggle("done", rowComplete(r));
  for (var c = 0; c < n; c++) colClueEls[c].classList.toggle("done", colComplete(c));
}

/* ---------- 操作 ---------- */
function hasProgress() {
  var g = state.game;
  for (var r = 0; r < g.puzzle.n; r++) {
    for (var c = 0; c < g.puzzle.n; c++) {
      if (g.cells[r][c] !== 0) return true;
    }
  }
  return false;
}

function onTapCell(r, c) {
  var g = state.game;
  if (g.solved) return;
  var cur = g.cells[r][c];
  var sol = g.puzzle.solution[r][c];
  var next;
  if (cur === 0) {
    if (mode === "fill") {
      if (sol) { next = 1; g.remaining--; }
      else { next = 3; g.mistakes++; vibrate(30); }
    } else {
      next = 2;
    }
  } else {
    next = 0;
    if (cur === 1) g.remaining++;
  }
  g.history.push({ r: r, c: c, prev: cur });
  if (g.history.length > 300) g.history.shift();
  g.cells[r][c] = next;
  applyCellVisual(cellEls[r][c], next);
  updateClueStatus(r, c);
  updateStatsUI();
  save();
  if (g.remaining <= 0) onSolved();
}

function countRemaining() {
  var g = state.game, n = g.puzzle.n, cnt = 0;
  for (var r = 0; r < n; r++) {
    for (var c = 0; c < n; c++) {
      if (g.puzzle.solution[r][c] && g.cells[r][c] !== 1) cnt++;
    }
  }
  return cnt;
}

function undo() {
  var g = state.game;
  if (g.solved || !g.history.length) return;
  var last = g.history.pop();
  g.cells[last.r][last.c] = last.prev;
  applyCellVisual(cellEls[last.r][last.c], last.prev);
  updateClueStatus(last.r, last.c);
  g.remaining = countRemaining();
  updateStatsUI();
  save();
}

function hint() {
  var g = state.game;
  if (g.solved) return;
  var n = g.puzzle.n;
  var candidates = [];
  for (var r = 0; r < n; r++) {
    for (var c = 0; c < n; c++) {
      if (g.puzzle.solution[r][c] && g.cells[r][c] !== 1) candidates.push([r, c]);
    }
  }
  if (!candidates.length) return;
  var pick = candidates[Math.floor(Math.random() * candidates.length)];
  var r = pick[0], c = pick[1];
  g.history.push({ r: r, c: c, prev: g.cells[r][c] });
  g.cells[r][c] = 1;
  g.remaining--;
  g.hints = (g.hints || 0) + 1;
  applyCellVisual(cellEls[r][c], 1);
  updateClueStatus(r, c);
  updateStatsUI();
  save();
  if (g.remaining <= 0) onSolved();
}

function onSolved() {
  var g = state.game;
  g.solved = true;
  stopTimer();
  state.streak++;
  state.totalCleared++;
  if (state.streak > state.best) state.best = state.streak;
  save();
  updateStatsUI();
  showWinOverlay();
}

function startNewPuzzle(resetStreak) {
  if (resetStreak) state.streak = 0;
  var n = sizeForMode(state.sizeMode, state.streak);
  state.game = newGameState(n);
  save();
  renderBoard();
  updateStatsUI();
  startTimer();
}

function confirmAbandonIfNeeded() {
  var g = state.game;
  if (g.solved) return true;
  if (!hasProgress()) return true;
  return confirm("現在の問題を放棄して、新しい問題を始めますか？（連続クリア記録がリセットされます）");
}

/* ---------- タイマー ---------- */
function startTimer() {
  stopTimer();
  timerHandle = setInterval(function () {
    if (state.game.solved) return;
    state.game.elapsed++;
    $("statTime").textContent = fmtTime(state.game.elapsed);
    if (state.game.elapsed % 5 === 0) save();
  }, 1000);
}
function stopTimer() {
  if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
}

/* ---------- HUD ---------- */
function updateStatsUI() {
  var g = state.game;
  $("statSize").textContent = g.puzzle.n + "×" + g.puzzle.n;
  $("statMistakes").textContent = g.mistakes;
  $("statStreak").textContent = state.streak;
  $("statBest").textContent = state.best;
  $("statTime").textContent = fmtTime(g.elapsed);
  $("sizeSelect").value = state.sizeMode;
}

function showWinOverlay() {
  var g = state.game;
  $("winTime").textContent = fmtTime(g.elapsed);
  $("winMistakes").textContent = g.mistakes;
  $("winStreak").textContent = state.streak;
  $("winModal").classList.add("open");
}

function syncSettingsUI() {
  applyTheme();
  $("settingsTotals").innerHTML =
    "これまでにクリアしたパズル：" + state.totalCleared + "問<br>" +
    "現在の連続クリア：" + state.streak + "　／　ベスト：" + state.best;
}

/* ---------- イベント登録 ---------- */
document.addEventListener("DOMContentLoaded", function () {
  load();
  applyTheme();
  renderBoard();
  updateStatsUI();
  if (!state.game.solved) startTimer();

  $("board").addEventListener("click", function (e) {
    var cell = e.target.closest(".cell");
    if (!cell) return;
    onTapCell(Number(cell.dataset.r), Number(cell.dataset.c));
  });
  $("board").addEventListener("contextmenu", function (e) { e.preventDefault(); });

  $("modeFillBtn").addEventListener("click", function () {
    mode = "fill";
    $("modeFillBtn").classList.add("on");
    $("modeMarkBtn").classList.remove("on");
  });
  $("modeMarkBtn").addEventListener("click", function () {
    mode = "mark";
    $("modeMarkBtn").classList.add("on");
    $("modeFillBtn").classList.remove("on");
  });

  $("btnUndo").addEventListener("click", undo);
  $("btnHint").addEventListener("click", hint);

  $("btnNew").addEventListener("click", function () {
    if (!confirmAbandonIfNeeded()) return;
    var reset = !state.game.solved && hasProgress();
    startNewPuzzle(reset);
  });

  $("sizeSelect").addEventListener("change", function () {
    var newMode = this.value;
    if (newMode === state.sizeMode) return;
    if (!confirmAbandonIfNeeded()) { this.value = state.sizeMode; return; }
    var reset = !state.game.solved && hasProgress();
    state.sizeMode = newMode;
    startNewPuzzle(reset);
  });

  $("btnSettings").addEventListener("click", function () {
    syncSettingsUI();
    $("settingsModal").classList.add("open");
  });
  $("btnCloseSettings").addEventListener("click", function () {
    $("settingsModal").classList.remove("open");
  });
  $("settingsModal").addEventListener("click", function (e) {
    if (e.target === this) this.classList.remove("open");
  });

  $("themeLightBtn").addEventListener("click", function () {
    state.theme = "light";
    applyTheme();
    save();
  });
  $("themeDarkBtn").addEventListener("click", function () {
    state.theme = "dark";
    applyTheme();
    save();
  });

  $("btnResetProgress").addEventListener("click", function () {
    if (!confirm("記録・進行状況をすべて削除して最初からやり直します。よろしいですか？")) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    state = defaultState();
    applyTheme();
    renderBoard();
    updateStatsUI();
    startTimer();
    $("settingsModal").classList.remove("open");
    toast("リセットしました");
  });

  $("btnNext").addEventListener("click", function () {
    $("winModal").classList.remove("open");
    startNewPuzzle(false);
  });
  $("winModal").addEventListener("click", function (e) {
    if (e.target === this) {
      this.classList.remove("open");
      startNewPuzzle(false);
    }
  });

  if ("serviceWorker" in navigator && location.protocol === "https:") {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  }
});
</script>
</body>
</html>
