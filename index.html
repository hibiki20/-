<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#4f63d2">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>見積・請求書</title>
<style>
:root {
  --primary: #4f63d2;
  --primary-dark: #3b4cb8;
  --bg: #f2f3f7;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-sub: #7a7d8f;
  --border: #e4e6ef;
  --danger: #e5484d;
  --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  height: 100vh;
  height: 100dvh; /* アドレスバーの伸縮も自動追従 */
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.app {
  flex: 1;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ヘッダー */
.header {
  background: var(--card);
  padding: 18px 20px 14px;
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 18px; font-weight: 700; }
.header p { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

/* 画面 */
.screen { display: none; padding: 20px 16px 32px; }
.screen.active { display: block; }

/* カード */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 16px;
  margin-bottom: 14px;
  box-shadow: 0 1px 3px rgba(20, 24, 60, 0.05);
}
.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-sub);
  margin-bottom: 14px;
  letter-spacing: 0.05em;
}

/* フォーム */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 6px;
}
input, select {
  width: 100%;
  height: 46px;
  padding: 0 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  background: #fafbfc;
  color: var(--text);
  appearance: none;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--primary);
  background: #fff;
}
.row { display: flex; gap: 10px; }
.row .field { flex: 1; }

/* 入力方法切替 */
.seg { display: flex; gap: 8px; }
.seg-btn {
  flex: 1;
  height: 42px;
  border: 1.5px solid var(--border);
  background: #fafbfc;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  font-family: inherit;
  cursor: pointer;
}
.seg-btn.on {
  border-color: var(--primary);
  color: var(--primary);
  background: #edf0ff;
}

/* ボタン */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 48px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
.btn-ghost { background: #f0f1f6; color: var(--text); }
.btn + .btn { margin-top: 10px; }
.btn-sm {
  width: auto;
  height: 34px;
  padding: 0 14px;
  font-size: 13px;
  border-radius: 8px;
}
.btn-del { background: #feeceb; color: var(--danger); }

/* 明細リスト */
.item-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.item-row:last-child { border-bottom: none; }
.item-row.editing { background: #eef1ff; margin: 0 -8px; padding: 12px 8px; border-radius: 10px; }
.item-top { display: flex; align-items: center; gap: 10px; }
.item-acts { display: flex; gap: 6px; margin-top: 9px; }
.btn-mini {
  height: 32px;
  padding: 0 13px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #f6f7fb;
  color: var(--text);
  cursor: pointer;
}
.btn-mini:disabled { opacity: .3; }
.btn-mini.danger { background: #feeceb; color: var(--danger); border-color: transparent; }
.item-main { flex: 1; min-width: 0; }
.item-name { font-weight: 600; font-size: 14px; }
.item-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
.item-price { font-weight: 700; font-size: 14px; white-space: nowrap; }

/* 合計 */
.total-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  font-size: 14px;
  color: var(--text-sub);
}
.total-line.grand {
  border-top: 2px solid var(--text);
  margin-top: 8px;
  padding-top: 12px;
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
}

/* 一覧 */
.doc-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 3px rgba(20, 24, 60, 0.05);
}
.doc-top { display: flex; justify-content: space-between; align-items: flex-start; }
.doc-type {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  background: #edf0ff;
  padding: 3px 8px;
  border-radius: 6px;
  margin-bottom: 6px;
}
.doc-customer { font-weight: 700; font-size: 15px; }
.doc-project { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
.doc-total { font-weight: 800; font-size: 16px; }
.doc-date { font-size: 11px; color: var(--text-sub); text-align: right; margin-top: 2px; }
.doc-btns { display: flex; gap: 8px; margin-top: 12px; }

.empty {
  text-align: center;
  padding: 70px 20px;
  color: var(--text-sub);
}
.empty .icon { font-size: 44px; margin-bottom: 12px; }

/* 下部タブバー */
.tabbar {
  flex-shrink: 0;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
}
.tabbar button {
  flex: 1;
  border: none;
  background: none;
  padding: 10px 0 12px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-sub);
  cursor: pointer;
}
.tabbar button .ticon { display: block; font-size: 21px; margin-bottom: 3px; }
.tabbar button.on { color: var(--primary); }

/* モーダル（プレビュー） */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 18, 40, 0.55);
  z-index: 200;
}
.modal.open { display: flex; flex-direction: column; justify-content: flex-end; }
.sheet {
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  max-height: 92vh;
  display: flex;
  flex-direction: column;
}
.sheet-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 18px 12px;
}
.sheet-head strong { font-size: 16px; }
.sheet-close {
  border: none;
  background: #e8e9f0;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  color: var(--text-sub);
}
.sheet-body { overflow-y: auto; padding: 0 16px 20px; }
.sheet-foot { padding: 12px 16px calc(14px + env(safe-area-inset-bottom)); background: var(--card); border-top: 1px solid var(--border); }

/* 帳票 */
.paper {
  background: #fff;
  border-radius: 10px;
  padding: 26px 20px;
  font-size: 12.5px;
  line-height: 1.75;
  color: #111;
  font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "Noto Serif JP", "MS PMincho", serif;
}
.paper h2 {
  text-align: center;
  font-size: 22px;
  letter-spacing: 0.4em;
  padding-left: 0.4em;
  margin-bottom: 10px;
}
.paper .p-date { text-align: right; font-size: 11px; }
.paper .p-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin: 12px 0 6px; }
.paper .p-to {
  font-size: 15px;
  font-weight: 700;
  border-bottom: 1px solid #333;
  padding: 0 26px 3px 2px;
  align-self: flex-start;
  margin-top: 6px;
}
.paper .p-from { font-size: 10.5px; line-height: 1.65; text-align: left; }
.paper .p-from strong { font-size: 12.5px; }
.paper .p-msg { font-size: 11.5px; margin: 4px 0 12px; }
.paper .p-project {
  font-size: 16px;
  font-weight: 700;
  border-bottom: 2px solid #333;
  display: inline-block;
  padding: 0 40px 3px 0;
  margin-bottom: 14px;
}
.paper .p-grand { font-size: 12px; font-weight: 700; margin: 2px 0 14px; }
.paper .p-grand .amt {
  font-size: 16px;
  border-bottom: 3px double #333;
  padding: 0 14px 2px 6px;
  margin: 0 6px 0 10px;
}
.paper table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
.paper th, .paper td { border: 1px solid #999; padding: 7px 8px; }
.paper th { background: #f0f1f6; font-weight: 700; text-align: center; }
.paper td.num { text-align: right; white-space: nowrap; }
.paper .p-sum { margin-top: 12px; margin-left: auto; width: 200px; font-size: 12px; }
.paper .p-sum div { display: flex; justify-content: space-between; padding: 3px 0; }
.paper .p-sum .g { border-top: 1.5px solid #333; margin-top: 4px; padding-top: 7px; font-weight: 800; font-size: 13.5px; }
.paper .p-remarks {
  margin-top: 18px;
  border: 1px solid #999;
  padding: 8px 10px 12px;
  font-size: 11px;
  line-height: 1.7;
  min-height: 64px;
}
.paper .p-remarks .r-title {
  font-weight: 700;
  border-bottom: 1px solid #ccc;
  padding-bottom: 3px;
  margin-bottom: 6px;
}

/* 印刷: 帳票だけを出力 */
@page { size: A4 portrait; margin: 12mm; }
@media print {
  body { background: #fff; padding: 0; display: block; height: auto; overflow: visible; }
  .app, .tabbar, .modal, .toast { display: none !important; }
  #printArea { display: block !important; }
  #printArea .paper { border-radius: 0; padding: 0; font-size: 12px; }

  /* 改ページ制御 */
  #printArea table { page-break-inside: auto; }
  #printArea thead { display: table-header-group; }   /* 2ページ目にも表ヘッダーを印字 */
  #printArea tr { page-break-inside: avoid; }          /* 行の途中で切らない */
  #printArea .p-head, #printArea .p-grand, #printArea .p-project { page-break-inside: avoid; }
  #printArea .p-sum { page-break-inside: avoid; }      /* 小計〜合計は分断しない */
  #printArea .p-remarks { page-break-inside: avoid; }  /* 備考も分断しない */

  /* 明細が多いときの縮小モード（1〜2枚に収める） */
  #printArea .paper.compact { font-size: 10.5px; line-height: 1.5; }
  #printArea .paper.compact table { font-size: 10px; }
  #printArea .paper.compact th, #printArea .paper.compact td { padding: 4px 6px; }
  #printArea .paper.compact h2 { font-size: 19px; margin-bottom: 6px; }
  #printArea .paper.compact .p-project { font-size: 14px; margin-bottom: 10px; }
  #printArea .paper.compact .p-grand { margin-bottom: 10px; }
  #printArea .paper.compact .p-msg { margin: 3px 0 8px; }
}
#printArea { display: none; }

.toast {
  position: fixed;
  left: 50%;
  bottom: 90px;
  transform: translateX(-50%);
  background: rgba(25, 28, 50, 0.92);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  padding: 11px 22px;
  border-radius: 30px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  z-index: 300;
  white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1 id="headerTitle">新規作成</h1>
    <p id="headerSub">見積書・請求書をかんたん作成</p>
  </div>

  <!-- ========== 作成画面 ========== -->
  <div class="screen active" id="screen-create">
    <div class="card">
      <div class="card-title">基本情報</div>
      <div class="field">
        <label>書類の種類</label>
        <select id="docType">
          <option value="見積書">見積書</option>
          <option value="請求書">請求書</option>
        </select>
      </div>
      <div class="field">
        <label>日付</label>
        <input type="date" id="docDate">
      </div>
      <div class="field">
        <label>宛先（顧客名）</label>
        <input type="text" id="customerName" placeholder="○○○○株式会社">
      </div>
      <div class="field">
        <label>件名</label>
        <input type="text" id="projectName" placeholder="外壁塗装修繕工事">
      </div>
    </div>

    <div class="card">
      <div class="card-title">明細を追加</div>
      <div class="field">
        <label>内容</label>
        <input type="text" id="itemName" placeholder="下地調整">
      </div>
      <div class="field">
        <label>入力方法</label>
        <div class="seg">
          <button type="button" class="seg-btn on" id="modeQty">数量×単価</button>
          <button type="button" class="seg-btn" id="modeLump">一式</button>
          <button type="button" class="seg-btn" id="modeDetail">内訳行</button>
        </div>
        <p style="font-size:11px;color:var(--text-sub);margin-top:6px" id="modeHint">数量と単価から金額を自動計算します</p>
      </div>
      <div class="row" id="qtyRow">
        <div class="field">
          <label>数量</label>
          <input type="number" id="itemQty" placeholder="100" inputmode="decimal">
        </div>
        <div class="field">
          <label>単位</label>
          <input type="text" id="itemUnit" placeholder="㎡">
        </div>
        <div class="field">
          <label>単価</label>
          <input type="number" id="itemPrice" placeholder="500" inputmode="numeric">
        </div>
      </div>
      <div class="field" id="lumpRow" style="display:none">
        <label>金額（一式）</label>
        <input type="number" id="itemAmount" placeholder="50000" inputmode="numeric">
      </div>
      <button class="btn btn-outline" id="btnAddItem" style="margin-top:4px">＋ 明細に追加</button>
      <button class="btn btn-ghost" id="btnCancelEdit" style="display:none;margin-top:10px">編集をやめる</button>
    </div>

    <div class="card" id="itemsCard" style="display:none">
      <div class="card-title">明細</div>
      <div id="itemsList"></div>
      <div style="margin-top:10px">
        <div class="total-line"><span>小計</span><span id="sumSubtotal">¥0</span></div>
        <div class="total-line"><span>消費税（10%）</span><span id="sumTax">¥0</span></div>
        <div class="total-line" style="gap:12px">
          <span>値引き</span>
          <input type="number" id="discount" placeholder="0" inputmode="numeric" style="width:130px;height:38px;text-align:right">
        </div>
        <div class="total-line grand"><span>合計</span><span id="sumTotal">¥0</span></div>
      </div>
    </div>

    <button class="btn btn-primary" id="btnPreview">プレビューを見る</button>
    <button class="btn btn-ghost" id="btnSave">下書き保存</button>
  </div>

  <!-- ========== 一覧画面 ========== -->
  <div class="screen" id="screen-list">
    <div id="docList"></div>
  </div>

  <!-- ========== 設定画面 ========== -->
  <div class="screen" id="screen-settings">
    <div class="card">
      <div class="card-title">自社情報（帳票に印字されます）</div>
      <div class="field"><label>会社名・屋号</label><input type="text" id="setName"></div>
      <div class="field"><label>郵便番号</label><input type="text" id="setZip" placeholder="000-0000"></div>
      <div class="field"><label>住所</label><input type="text" id="setAddress"></div>
      <div class="field"><label>電話番号</label><input type="text" id="setPhone" inputmode="tel"></div>
      <div class="field"><label>代表者名</label><input type="text" id="setRep"></div>
      <div class="field"><label>振込先（任意）</label><input type="text" id="setBank" placeholder="○○銀行 ○○支店 普通 0000000"></div>
    </div>
    <button class="btn btn-primary" id="btnSaveSettings">設定を保存</button>
  </div>
</div>

<!-- 下部タブ -->
<div class="tabbar">
  <button class="on" data-screen="create"><span class="ticon">✏️</span>作成</button>
  <button data-screen="list"><span class="ticon">📂</span>一覧</button>
  <button data-screen="settings"><span class="ticon">⚙️</span>設定</button>
</div>

<!-- プレビューモーダル -->
<div class="modal" id="previewModal">
  <div class="sheet">
    <div class="sheet-head">
      <strong>プレビュー</strong>
      <button class="sheet-close" id="btnClosePreview">✕</button>
    </div>
    <div class="sheet-body">
      <div class="paper" id="previewPaper"></div>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-primary" id="btnPrint">PDFに保存・印刷する</button>
      <button class="btn btn-ghost" id="btnSaveFromPreview">保存して閉じる</button>
    </div>
  </div>
</div>

<!-- 印刷専用領域 -->
<div id="printArea"><div class="paper" id="printPaper"></div></div>

<div class="toast" id="toast"></div>

<script>
"use strict";

var items = [];
var documents = [];
var settings = {
  name: "", zip: "", address: "", phone: "", rep: "", bank: ""
};
var previewingDoc = null;
var editingIndex = -1;

/* ---------- ユーティリティ ---------- */
function $(id) { return document.getElementById(id); }
function yen(n) { return "¥" + Number(n).toLocaleString("ja-JP"); }
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function toast(msg) {
  var t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1800);
}
function todayStr() {
  var d = new Date();
  var m = ("0" + (d.getMonth() + 1)).slice(-2);
  var day = ("0" + d.getDate()).slice(-2);
  return d.getFullYear() + "-" + m + "-" + day;
}
function jpDate(iso) {
  if (!iso) return "";
  var p = iso.split("-");
  return p[0] + "年" + Number(p[1]) + "月" + Number(p[2]) + "日";
}

/* ---------- ストレージ ---------- */
function loadAll() {
  try {
    var d = localStorage.getItem("inv_documents");
    if (d) documents = JSON.parse(d);
    var s = localStorage.getItem("inv_settings");
    if (s) settings = JSON.parse(s);
  } catch (e) {}
}
function persistDocs() {
  try { localStorage.setItem("inv_documents", JSON.stringify(documents)); } catch (e) {}
}
function persistSettings() {
  try { localStorage.setItem("inv_settings", JSON.stringify(settings)); } catch (e) {}
}

/* ---------- 画面切替 ---------- */
var titles = {
  create: ["新規作成", "見積書・請求書をかんたん作成"],
  list: ["書類一覧", "保存した書類を表示・出力できます"],
  settings: ["設定", "自社情報を登録してください"]
};
function showScreen(name) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");
  $("screen-" + name).classList.add("active");

  var tabs = document.querySelectorAll(".tabbar button");
  for (var j = 0; j < tabs.length; j++) {
    tabs[j].classList.toggle("on", tabs[j].getAttribute("data-screen") === name);
  }
  $("headerTitle").textContent = titles[name][0];
  $("headerSub").textContent = titles[name][1];

  if (name === "list") renderDocList();
  if (name === "settings") fillSettingsForm();
  document.querySelector(".app").scrollTop = 0;
}

/* ---------- 明細 ---------- */
function calc() {
  var subtotal = 0;
  for (var i = 0; i < items.length; i++) subtotal += items[i].amount;
  var tax = Math.floor(subtotal * 0.1);
  var discount = Number($("discount").value) || 0;
  return { subtotal: subtotal, tax: tax, discount: discount, total: subtotal + tax - discount };
}

function renderItems() {
  var list = $("itemsList");
  list.innerHTML = "";
  for (var i = 0; i < items.length; i++) {
    (function(idx) {
      var it = items[idx];
      var row = document.createElement("div");
      row.className = "item-row" + (idx === editingIndex ? " editing" : "");
      var sub;
      if (it.detail) sub = '<div class="item-sub">内訳行（金額なし）</div>';
      else if (it.lump) sub = '<div class="item-sub">一式</div>';
      else sub = '<div class="item-sub">' + esc(it.qty) + esc(it.unit) + " × " + yen(it.price) + "</div>";
      row.innerHTML =
        '<div class="item-top">' +
          '<div class="item-main"' + (it.detail ? ' style="padding-left:16px"' : "") + '>' +
            '<div class="item-name"' + (it.detail ? ' style="font-weight:400;color:var(--text-sub)"' : "") + '>' + esc(it.name) + '</div>' +
            sub +
          '</div>' +
          '<div class="item-price">' + (it.detail ? "" : yen(it.amount)) + '</div>' +
        '</div>';

      var acts = document.createElement("div");
      acts.className = "item-acts";

      var bUp = document.createElement("button");
      bUp.className = "btn-mini";
      bUp.textContent = "↑";
      bUp.disabled = idx === 0;
      bUp.onclick = function() { moveItem(idx, -1); };

      var bDown = document.createElement("button");
      bDown.className = "btn-mini";
      bDown.textContent = "↓";
      bDown.disabled = idx === items.length - 1;
      bDown.onclick = function() { moveItem(idx, 1); };

      var bEdit = document.createElement("button");
      bEdit.className = "btn-mini";
      bEdit.textContent = "編集";
      bEdit.onclick = function() { startEdit(idx); };

      var bDel = document.createElement("button");
      bDel.className = "btn-mini danger";
      bDel.textContent = "削除";
      bDel.onclick = function() {
        if (editingIndex === idx) cancelEdit();
        else if (editingIndex > idx) editingIndex--;
        items.splice(idx, 1);
        renderItems();
      };

      acts.appendChild(bUp);
      acts.appendChild(bDown);
      acts.appendChild(bEdit);
      acts.appendChild(bDel);
      row.appendChild(acts);
      list.appendChild(row);
    })(i);
  }
  $("itemsCard").style.display = items.length ? "block" : "none";
  updateSummary();
}

function updateSummary() {
  var c = calc();
  $("sumSubtotal").textContent = yen(c.subtotal);
  $("sumTax").textContent = yen(c.tax);
  $("sumTotal").textContent = yen(c.total);
}

var inputMode = "qty";
var modeHints = {
  qty: "数量と単価から金額を自動計算します",
  lump: "数量・単価は印字せず「一式」と表示し、金額を直接入力します",
  detail: "金額なしの補足行です（例：下塗り（サビ止め）などの作業内訳）"
};

function setMode(mode) {
  inputMode = mode;
  $("modeQty").classList.toggle("on", mode === "qty");
  $("modeLump").classList.toggle("on", mode === "lump");
  $("modeDetail").classList.toggle("on", mode === "detail");
  $("qtyRow").style.display = mode === "qty" ? "flex" : "none";
  $("lumpRow").style.display = mode === "lump" ? "block" : "none";
  $("modeHint").textContent = modeHints[mode];
}

function addItem() {
  var name = $("itemName").value.trim();
  if (!name) { toast("内容を入力してください"); return; }

  var obj;
  if (inputMode === "detail") {
    obj = { name: name, detail: true, amount: 0 };
  } else if (inputMode === "lump") {
    var amount = Number($("itemAmount").value);
    if (!amount || amount <= 0) { toast("金額を入力してください"); return; }
    obj = { name: name, lump: true, amount: Math.round(amount) };
  } else {
    var qty = Number($("itemQty").value);
    var unit = $("itemUnit").value.trim() || "㎡";
    var price = Number($("itemPrice").value);
    if (!qty || qty <= 0) { toast("数量を入力してください"); return; }
    if (!price || price <= 0) { toast("単価を入力してください"); return; }
    obj = { name: name, qty: qty, unit: unit, price: price, amount: Math.round(qty * price) };
  }

  if (editingIndex >= 0) {
    items[editingIndex] = obj;
    toast("明細を更新しました");
    cancelEdit();
    return;
  }

  items.push(obj);
  clearItemForm();
  renderItems();
  $("itemName").focus();
}

function clearItemForm() {
  $("itemName").value = "";
  $("itemQty").value = "";
  $("itemUnit").value = "";
  $("itemPrice").value = "";
  $("itemAmount").value = "";
}

function startEdit(idx) {
  var it = items[idx];
  editingIndex = idx;
  if (it.detail) setMode("detail");
  else if (it.lump) setMode("lump");
  else setMode("qty");
  clearItemForm();
  $("itemName").value = it.name;
  if (it.lump) $("itemAmount").value = it.amount;
  if (!it.lump && !it.detail) {
    $("itemQty").value = it.qty;
    $("itemUnit").value = it.unit;
    $("itemPrice").value = it.price;
  }
  $("btnAddItem").textContent = "✓ この内容で更新";
  $("btnCancelEdit").style.display = "flex";
  renderItems();
  $("itemName").scrollIntoView({ behavior: "smooth", block: "center" });
}

function cancelEdit() {
  editingIndex = -1;
  clearItemForm();
  $("btnAddItem").textContent = "＋ 明細に追加";
  $("btnCancelEdit").style.display = "none";
  renderItems();
}

function moveItem(idx, dir) {
  var to = idx + dir;
  if (to < 0 || to >= items.length) return;
  var tmp = items[idx];
  items[idx] = items[to];
  items[to] = tmp;
  if (editingIndex === idx) editingIndex = to;
  else if (editingIndex === to) editingIndex = idx;
  renderItems();
}

/* ---------- 書類の組み立て ---------- */
function buildDocFromForm() {
  var customer = $("customerName").value.trim();
  var project = $("projectName").value.trim();
  if (!customer) { toast("宛先を入力してください"); return null; }
  if (!project) { toast("件名を入力してください"); return null; }
  if (!items.length) { toast("明細を1件以上追加してください"); return null; }
  var c = calc();
  return {
    id: Date.now(),
    type: $("docType").value,
    date: $("docDate").value || todayStr(),
    customer: customer,
    project: project,
    items: JSON.parse(JSON.stringify(items)),
    subtotal: c.subtotal,
    tax: c.tax,
    discount: c.discount,
    total: c.total
  };
}

function clearForm() {
  items = [];
  editingIndex = -1;
  clearItemForm();
  $("btnAddItem").textContent = "＋ 明細に追加";
  $("btnCancelEdit").style.display = "none";
  $("customerName").value = "";
  $("projectName").value = "";
  $("discount").value = "";
  $("docDate").value = todayStr();
  renderItems();
}

/* ---------- 帳票HTML ---------- */
var greetings = {
  "見積書": "下記の通り、御見積り申し上げます。",
  "請求書": "下記の通り、御請求申し上げます。"
};
var titleMap = {
  "見積書": "御見積書",
  "請求書": "御請求書"
};
var dateLabels = {
  "見積書": "見積日",
  "請求書": "請求日"
};
function slashDate(iso) {
  if (!iso) return "";
  var p = iso.split("-");
  return p[0] + "/" + Number(p[1]) + "/" + Number(p[2]);
}

function paperHTML(doc) {
  var rows = "";
  for (var i = 0; i < doc.items.length; i++) {
    var it = doc.items[i];
    if (it.detail) {
      rows +=
        "<tr>" +
          '<td style="padding-left:1.8em">' + esc(it.name) + "</td>" +
          "<td></td><td></td><td></td>" +
        "</tr>";
    } else if (it.lump) {
      rows +=
        "<tr>" +
          "<td>" + esc(it.name) + "</td>" +
          '<td class="num"></td>' +
          '<td class="num">一式</td>' +
          '<td class="num">' + yen(it.amount) + "</td>" +
        "</tr>";
    } else {
      rows +=
        "<tr>" +
          "<td>" + esc(it.name) + "</td>" +
          '<td class="num">' + esc(it.qty) + " " + esc(it.unit) + "</td>" +
          '<td class="num">' + yen(it.price) + "</td>" +
          '<td class="num">' + yen(it.amount) + "</td>" +
        "</tr>";
    }
  }

  var from = "";
  if (settings.name) from += "<strong>" + esc(settings.name) + "</strong><br>";
  if (settings.zip) from += "〒" + esc(settings.zip) + "<br>";
  if (settings.address) from += esc(settings.address) + "<br>";
  if (settings.rep) from += "代表：" + esc(settings.rep) + "<br>";
  if (settings.phone) from += "TEL：" + esc(settings.phone);

  var discountLine = "";
  if (doc.discount > 0) {
    discountLine = "<div><span>値引き</span><span>-¥" + Number(doc.discount).toLocaleString("ja-JP") + "</span></div>";
  }

  var remarksHTML = "";
  if (doc.type === "請求書") {
    var bank = settings.bank ? "＜振込先＞<br>" + esc(settings.bank) : "";
    remarksHTML =
      '<div style="clear:both"></div>' +
      '<div class="p-remarks"><div class="r-title">備　考</div>' + bank + "</div>";
  }

  return (
    '<div class="p-date">' + (dateLabels[doc.type] || "発行日") + "　" + slashDate(doc.date) + "</div>" +
    "<h2>" + esc(titleMap[doc.type] || doc.type) + "</h2>" +
    '<div class="p-head">' +
      '<div class="p-to">' + esc(doc.customer) + "　様</div>" +
      '<div class="p-from">' + from + "</div>" +
    "</div>" +
    '<div class="p-msg">' + (greetings[doc.type] || "") + "</div>" +
    '<div class="p-grand">合計金額<span class="amt">' + yen(doc.total) + "</span>（税込）</div>" +
    '<div class="p-project">工事件名：　' + esc(doc.project) + "</div>" +
    "<table><thead><tr><th>内　容</th><th>数量</th><th>単価</th><th>金額</th></tr></thead>" +
    "<tbody>" + rows + "</tbody></table>" +
    '<div class="p-sum">' +
      "<div><span>小計</span><span>" + yen(doc.subtotal) + "</span></div>" +
      "<div><span>消費税（10%）</span><span>" + yen(doc.tax) + "</span></div>" +
      discountLine +
      '<div class="g"><span>合計</span><span>' + yen(doc.total) + "</span></div>" +
    "</div>" +
    remarksHTML
  );
}

/* ---------- プレビュー ---------- */
function openPreview(doc, fromForm) {
  previewingDoc = doc;
  $("previewPaper").innerHTML = paperHTML(doc);
  $("btnSaveFromPreview").style.display = fromForm ? "flex" : "none";
  $("previewModal").classList.add("open");
}
function closePreview() {
  $("previewModal").classList.remove("open");
  previewingDoc = null;
}
function printCurrent() {
  if (!previewingDoc) return;
  var paper = $("printPaper");
  paper.innerHTML = paperHTML(previewingDoc);
  // 明細が多いときは自動で縮小し、1〜2枚に綺麗に収める
  paper.classList.toggle("compact", previewingDoc.items.length > 18);
  window.print();
}

/* ---------- 保存・一覧 ---------- */
function saveDoc(doc) {
  documents.unshift(doc);
  persistDocs();
  toast(doc.type + "を保存しました");
}

function renderDocList() {
  var wrap = $("docList");
  if (!documents.length) {
    wrap.innerHTML =
      '<div class="empty"><div class="icon">📂</div>' +
      "保存された書類はありません<br>「作成」タブから作ってみましょう</div>";
    return;
  }
  wrap.innerHTML = "";
  for (var i = 0; i < documents.length; i++) {
    (function(idx) {
      var d = documents[idx];
      var card = document.createElement("div");
      card.className = "doc-card";
      card.innerHTML =
        '<div class="doc-top">' +
          "<div>" +
            '<span class="doc-type">' + esc(d.type) + "</span>" +
            '<div class="doc-customer">' + esc(d.customer) + " 様</div>" +
            '<div class="doc-project">' + esc(d.project) + "</div>" +
          "</div>" +
          '<div style="text-align:right">' +
            '<div class="doc-total">' + yen(d.total) + "</div>" +
            '<div class="doc-date">' + esc(d.date) + "</div>" +
          "</div>" +
        "</div>";
      var btns = document.createElement("div");
      btns.className = "doc-btns";

      var bView = document.createElement("button");
      bView.className = "btn btn-sm btn-outline";
      bView.textContent = "表示・PDF";
      bView.onclick = function() { openPreview(d, false); };

      var bDel = document.createElement("button");
      bDel.className = "btn btn-sm btn-del";
      bDel.textContent = "削除";
      bDel.onclick = function() {
        if (confirm("この書類を削除しますか？")) {
          documents.splice(idx, 1);
          persistDocs();
          renderDocList();
        }
      };
      btns.appendChild(bView);
      btns.appendChild(bDel);
      card.appendChild(btns);
      wrap.appendChild(card);
    })(i);
  }
}

/* ---------- 設定 ---------- */
function fillSettingsForm() {
  $("setName").value = settings.name || "";
  $("setZip").value = settings.zip || "";
  $("setAddress").value = settings.address || "";
  $("setPhone").value = settings.phone || "";
  $("setRep").value = settings.rep || "";
  $("setBank").value = settings.bank || "";
}
function saveSettings() {
  settings = {
    name: $("setName").value.trim(),
    zip: $("setZip").value.trim(),
    address: $("setAddress").value.trim(),
    phone: $("setPhone").value.trim(),
    rep: $("setRep").value.trim(),
    bank: $("setBank").value.trim()
  };
  persistSettings();
  toast("設定を保存しました");
}

/* ---------- イベント登録 ---------- */
document.addEventListener("DOMContentLoaded", function() {
  loadAll();
  $("docDate").value = todayStr();

  var tabs = document.querySelectorAll(".tabbar button");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener("click", function() {
      showScreen(this.getAttribute("data-screen"));
    });
  }

  $("btnAddItem").addEventListener("click", addItem);
  $("btnCancelEdit").addEventListener("click", cancelEdit);
  $("modeQty").addEventListener("click", function() { setMode("qty"); });
  $("modeLump").addEventListener("click", function() { setMode("lump"); });
  $("modeDetail").addEventListener("click", function() { setMode("detail"); });
  $("discount").addEventListener("input", updateSummary);

  $("btnPreview").addEventListener("click", function() {
    var doc = buildDocFromForm();
    if (doc) openPreview(doc, true);
  });

  $("btnSave").addEventListener("click", function() {
    var doc = buildDocFromForm();
    if (doc) {
      saveDoc(doc);
      clearForm();
      showScreen("list");
    }
  });

  $("btnSaveFromPreview").addEventListener("click", function() {
    if (previewingDoc) {
      saveDoc(previewingDoc);
      closePreview();
      clearForm();
      showScreen("list");
    }
  });

  $("btnClosePreview").addEventListener("click", closePreview);
  $("btnPrint").addEventListener("click", printCurrent);

  $("previewModal").addEventListener("click", function(e) {
    if (e.target === this) closePreview();
  });

  $("btnSaveSettings").addEventListener("click", saveSettings);

  if ("serviceWorker" in navigator && location.protocol === "https:") {
    navigator.serviceWorker.register("sw.js").catch(function() {});
  }
});
</script>
</body>
